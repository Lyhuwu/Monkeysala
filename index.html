<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monkeycine VIP</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #1a1a24; 
            color: #e2e8f0; 
            font-family: 'Nunito', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
            background-image: radial-gradient(#30363d 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .header { text-align: center; margin-bottom: 30px; position: relative; }
        .header h1 { 
            color: #bfa3ff; font-size: 3em; margin: 0; font-weight: 900;
            text-shadow: 3px 3px 0px #6b21a8, -1px -1px 0px #000;
            transform: rotate(-2deg);
        }
        .header p { 
            background: #ff79c6; color: #282a36; display: inline-block; 
            padding: 4px 12px; border-radius: 20px; font-weight: 900; 
            font-size: 14px; transform: rotate(3deg); border: 2px dashed #282a36;
        }
        
        .card { 
            background: #282a36; border: 3px dashed #6272a4; 
            border-radius: 15px; padding: 25px 20px; width: 100%; 
            max-width: 400px; box-shadow: 8px 8px 0px rgba(0,0,0,0.4); 
            margin-bottom: 25px; box-sizing: border-box;
        }

        .perfiles { display: flex; gap: 15px; justify-content: center; }
        .perfil-btn {
            background: #44475a; border: 2px solid #bd93f9; color: white;
            padding: 15px 20px; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; flex: 1;
            transition: transform 0.2s; box-shadow: 4px 4px 0px #bd93f9;
        }
        .perfil-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #bd93f9; }

        #zona-liz, #zona-sofi { display: none; }
        
        label { font-size: 14px; color: #8be9fd; font-weight: bold; margin-bottom: 8px; display: block; }
        input[type="text"] { 
            width: 100%; box-sizing: border-box; padding: 15px; 
            border-radius: 10px; border: 2px solid #6272a4; 
            background: #191a21; color: white; margin-bottom: 20px; 
            font-size: 14px; font-family: 'Nunito', sans-serif;
        }
        
        .btn-lanzar { 
            background-color: #50fa7b; color: #282a36; border: none; 
            padding: 16px; border-radius: 10px; font-size: 18px; 
            font-weight: 900; width: 100%; cursor: pointer; 
            box-shadow: 4px 4px 0px #218c41; transition: transform 0.1s; 
        }
        .btn-lanzar:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #218c41; }
        
        .btn-volver { background: none; border: none; color: #ff79c6; text-decoration: underline; cursor: pointer; margin-bottom: 15px; font-weight: bold;}

        /* Memory Card intacta */
        .memory-card { 
            background: #282a36; 
            border-radius: 15px; 
            padding: 20px; 
            width: 100%; 
            max-width: 400px; 
            border-left: 8px solid #ff5555; 
            box-sizing: border-box;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }
        .memory-card h3 { margin-top: 0; color: #f1fa8c; font-size: 18px; font-weight: 900; transform: rotate(-1deg);}
        .cita-item { padding: 12px; background: #191a21; border-radius: 8px; font-size: 14px; color: #f8f8f2; border: 1px dashed #6272a4; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍿 Monkeycine</h1>
        <p>SALA VIP EXCLUSIVA</p>
    </div>

    <div class="card" id="seleccion-perfil">
        <h2 style="text-align: center; color: white; margin-top: 0; font-size: 18px;">¿Quién eres? 👀</h2>
        <div class="perfiles">
            <button class="perfil-btn" onclick="seleccionarPerfil('liz')">👑 Liz</button>
            <button class="perfil-btn" style="border-color: #ff79c6; box-shadow: 4px 4px 0px #ff79c6;" onclick="seleccionarPerfil('sofi')">✨ Sofi</button>
        </div>
    </div>

    <div class="card" id="zona-liz">
        <button class="btn-volver" onclick="volverInicio()">← Cambiar perfil</button>
        <label>Pegar URL del Capítulo:</label>
        <input type="text" id="link-pelicula" placeholder="https://disneyplus.com/...">
        <button class="btn-lanzar" onclick="prepararSalaLiz()">Preparar Sala 🚀</button>
    </div>

    <div class="card" id="zona-sofi">
        <button class="btn-volver" onclick="volverInicio()">← Cambiar perfil</button>
        <div style="text-align: center; margin-bottom: 20px;">
            <p style="color: #8be9fd; font-weight: bold;">Estado de la sala:</p>
            <p id="estado-sala-sofi" style="color: #ffb86c; font-style: italic;">Esperando a que Liz ponga el link... 🥺</p>
        </div>
        <button class="btn-lanzar" id="btn-entrar-sofi" onclick="entrarSalaSofi()" style="background: #6272a4; box-shadow: 4px 4px 0px #44475a; cursor: not-allowed;" disabled>Entrar a la Cita ✨</button>
    </div>

    <div class="memory-card">
        <h3>🗂️ Memory Card</h3>
        <div id="lista-citas">
            <div class="cita-item">Historial de citas listo para conectarse... 💖</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Tus llaves exactas
        const firebaseConfig = {
            apiKey: "AIzaSyD5L51DKMU8ozgN8wTt9WATlgzjI7lQ2Ls",
            authDomain: "monkeycine.firebaseapp.com",
            projectId: "monkeycine",
            storageBucket: "monkeycine.firebasestorage.app",
            messagingSenderId: "134472914894",
            appId: "1:134472914894:web:df59027eb99b5c05207d9f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let linkMagicoActual = "";

        // =========================================
        // LÓGICA DE PERFILES Y NOTIFICACIONES
        // =========================================
        window.seleccionarPerfil = function(perfil) {
            document.getElementById('seleccion-perfil').style.display = 'none';
            if(perfil === 'liz') {
                document.getElementById('zona-liz').style.display = 'block';
            } else {
                document.getElementById('zona-sofi').style.display = 'block';
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }
        }

        window.volverInicio = function() {
            document.getElementById('seleccion-perfil').style.display = 'block';
            document.getElementById('zona-liz').style.display = 'none';
            document.getElementById('zona-sofi').style.display = 'none';
        }

        // =========================================
        // ESCUCHADOR DE FIREBASE (TELEPATÍA PARA SOFI)
        // =========================================
        const citaRef = ref(db, 'cita_actual');
        onValue(citaRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.url) {
                linkMagicoActual = data.url;
                
                const btnSofi = document.getElementById('btn-entrar-sofi');
                const estadoSofi = document.getElementById('estado-sala-sofi');
                
                if(btnSofi && estadoSofi) {
                    // Encender botón de Sofi
                    btnSofi.style.background = '#50fa7b';
                    btnSofi.style.boxShadow = '4px 4px 0px #218c41';
                    btnSofi.style.cursor = 'pointer';
                    btnSofi.disabled = false;
                    
                    // Cambiar texto
                    estadoSofi.style.color = '#50fa7b';
                    estadoSofi.textContent = "¡Liz ya preparó la peli! 🍿";
                    
                    // Lanzar notificación si está en perfil Sofi
                    if (document.getElementById('zona-sofi').style.display === 'block') {
                        if ("Notification" in window && Notification.permission === "granted") {
                            new Notification("¡Monkeycine Listo! 🍿", { body: "Liz acaba de encender la sala. ¡Entra ya!" });
                        }
                    }
                }
            }
        });

        // =========================================
        // BOTÓN LIZ: GUARDAR Y ABRIR LEMUR
        // =========================================
        window.prepararSalaLiz = function() {
            const inputLink = document.getElementById('link-pelicula').value.trim();
            if (!inputLink || !inputLink.includes('disneyplus.com')) {
                alert("⚠️ ¡Líder, necesitas pegar un link válido de Disney+!");
                return;
            }
            
            const urlBase = inputLink.split('?')[0];
            const linkMagico = urlBase + "?sala=monkeycine";
            
            // Subir a Firebase
            set(ref(db, 'cita_actual'), { url: linkMagico }).then(() => {
                // Y abrirle Lemur a Liz también
                const linkSinHttps = linkMagico.replace("https://", "");
                const urlLemur = `intent://${linkSinHttps}#Intent;scheme=https;package=com.lemurbrowser.exts;end;`;
                window.location.href = urlLemur;
            });
        }

        // =========================================
        // BOTÓN SOFI: LEER Y ABRIR LEMUR
        // =========================================
        window.entrarSalaSofi = function() {
            if (!linkMagicoActual) return; // Si el link está vacío, no hace nada
            
            const linkSinHttps = linkMagicoActual.replace("https://", "");
            const urlLemur = `intent://${linkSinHttps}#Intent;scheme=https;package=com.lemurbrowser.exts;end;`;
            window.location.href = urlLemur;
        }

        // Registro Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('SW registrado'))
                    .catch((err) => console.log('Error SW', err));
            });
        }
    </script>
</body>
</html>
