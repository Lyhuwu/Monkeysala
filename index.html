<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MonkeyHub 🐵</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <h1>MonkeyHub 🐵</h1>
    </header>

    <main id="app-content">
        
        <section id="vista-inicio" class="vista-activa">
            <h2 class="section-title">Resumen</h2>
            <div class="tarjeta-premium stat-card">
                <span class="stat-numero">14</span>
                <span class="stat-label">Monkey Abrazos</span>
            </div>
            </section>

        <section id="vista-historial" class="vista-oculta">
            <h2 class="section-title">Tus Memorias</h2>
            <div class="tarjeta-premium sesion-card">
                <h3>🎬 Inside Out 2</h3>
                <p>⏱ 2 h 14 min • 🤗 14 Abrazos</p>
            </div>
        </section>

        <section id="vista-perfil" class="vista-oculta">
            <h2 class="section-title">Perfil</h2>
            <div class="tarjeta-premium">
                <h3>Estadísticas Globales</h3>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item activo" data-target="vista-inicio">🏠<br><span>Inicio</span></button>
        <button class="nav-item" data-target="vista-historial">🎞️<br><span>Historial</span></button>
        <button class="nav-item" data-target="vista-perfil">👤<br><span>Perfil</span></button>
    </nav>

    <script src="router.js"></script>
</body>
</html>
